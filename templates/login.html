<!DOCTYPE html>
<html>

<head>

    <title>Hospital Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>AI Hospital Login</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    {% if error %}

    <p style="color:red; text-align:center;">
        {{ error }}
    </p>

    {% endif %}

</div>

</body>
</html>
